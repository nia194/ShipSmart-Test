# Pre-commit hooks. Install once:  uv run pre-commit install
# Run on all files:                 uv run pre-commit run --all-files
#
# Mirrors CI: ruff lint. The formatter is intentionally not enforced — the
# codebase lints with `ruff check`, not `ruff format`.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
        exclude: ^LICENSE$
      - id: trim-trailing-whitespace
      - id: check-yaml
      - id: check-merge-conflict
