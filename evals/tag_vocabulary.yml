# Canonical decision-tag vocabulary — evals §4.2 decision-tag contract AND the
# §13 coverage.yml join key. A tag whose namespace:base is EMITTED in ShipSmart-API
# but not listed here fails contract/test_decision_tags.py; a tag referenced by
# coverage.yml that is not listed here also fails.
#
# Each namespace lists its allowed BASE segments (the segment right after the
# namespace). Emitted tags may carry a dynamic detail suffix (e.g.
# "agent:retrieve:{n}", "workflow:classify:8806") — the contract validates the
# namespace:base prefix, not the dynamic tail. Reconciled 2026-07-08 against the
# tags ShipSmart-API actually emits.

tags:
  agent:
    - plan
    - step            # agent:step{n}
    - tool            # agent:tool:{name}
    - retrieve        # agent:retrieve:{n|reformulate|uncovered|capped|rejected}
    - max_steps
    - fallback        # agent:fallback:text

  compliance:
    - plan
    - investigate     # compliance:investigate:{area}
    - structural      # compliance:structural:{rule}
    - summarized
    - verdict         # compliance:verdict:{verdict}

  concierge:
    - plan
    - greeting
    - ready
    - reply_to
    - correction
    - intent          # concierge:intent:{intent}
    - dispatch        # concierge:dispatch:{intent|llm_degraded|summary_fallback}
    - scope           # concierge:scope:domestic_only
    - compliance      # concierge:compliance:explicit_skipped

  workflow:
    - start
    - classify        # workflow:classify:{hs|low_confidence}
    - complete
    - compliance      # workflow:compliance:explicit_skipped
    - interrupt       # workflow:interrupt:human_review
    - landed_cost     # workflow:landed_cost:{computed|trade_preference}
    - resume
    - review          # workflow:review:determination
    - routing         # workflow:routing:no_quotes
    - docs            # workflow:docs:generated:{n}
    - blocked

  budget:
    - trimmed         # budget:trimmed:{n}
    - exceeded        # budget:exceeded (per-session LLM/tool/token ceiling, F3)

  # Guardrail controls (release-gated). The first group is emitted today; the
  # second is the control vocabulary coverage.yml maps to eval cases and that
  # ships as the request-boundary / tool-policy phases land (F3–F6).
  guardrail:
    # emitted today
    - blocked
    - blocked_injection
    - neutralized_input
    - sanitized_chunk
    - sanitized_reference
    - structured_output_invalid   # output validator fallback (F1)
    - structured_output_retry     # output validator retry (F1)
    - refused
    - normalized                  # unicode normalization changed the input (F3)
    # planned control tags (coverage.yml)
    - injection
    - misuse_refused
    - state_unsigned
    - pii
    - leak
    - tool_denied
    - source_coverage_failure
    - tenant_isolation
    - embedding_version
