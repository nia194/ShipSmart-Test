# Dataset manifest (evals §3.2). Runners load through this, not filenames.
# Each suite: active version -> file -> sha256 -> case count -> last reviewed.
# Bumping a dataset is a reviewed diff (new file + new sha256 + new version),
# never a silent append. To re-record a sha256 after an authored edit:
#   uv run python -c "from evals.manifest import compute_sha256 as h; print(h('smoke/foundation.v1.jsonl'))"

suites:
  safety/redteam:
    layer: 4
    active_version: v1.0
    file: safety/redteam.v1.jsonl
    sha256: d1a9b7d87f223ff5c2571038c3708836f891f22d00f7a4fd3c92ea165ecf447b
    case_count: 33
    last_reviewed: "2026-07-08"
    note: >
      Canonical adversarial dataset (evals Layer-4 == guardrails guardrails_cases.jsonl;
      reconciliation #1). Every case carries a guardrail:* tag that coverage.yml joins
      on, so contract/test_coverage_completeness.py fails if any release-gated control
      drops below its min_cases. Attack classes: prompt injection (direct/indirect/
      encoded/role-play/delimiter/multilingual), misuse-evasion, forged-state,
      PII echo, output/secret leak, tool-policy denial, ungrounded-answer coercion.

  product/journeys:
    layer: 5
    active_version: v1.0
    file: product/journeys.v1.jsonl
    sha256: e3c13e31f3e0ec2628a1b2486754ad90096d21a68ab7c48ceebbe1ab34c2008b
    case_count: 6
    last_reviewed: "2026-07-08"
    note: >
      Layer-5 product-behavior journeys — quote->confirm->book happy path plus the
      §5.6 negatives the Orchestrator's AiClaimGuard enforces (book-without-quote,
      AI-fabricated price, advisory-only compliance, expired-quote rebook) and an
      explanation-quality case. CI grades behavior via the stub SUT; the judge_rubric
      cases score explanation quality in nightly/release. The Java-side guarantee is
      asserted structurally by contract/test_ai_trust_boundary.py.

  agent/tool_use:
    layer: 3
    active_version: v1.0
    file: agent/tool_use.v1.jsonl
    sha256: 490692103d0c21f892825aad4da852ff3fb2307280890b144e1b72a5a94cc387
    case_count: 6
    last_reviewed: "2026-07-08"
    note: >
      Layer-3 agent/tool-use cases — planner selects the right tool or clarifies an
      under-specified ask. CI grades tool_call/clarify behavior via the stub SUT; the
      scripted-agent SUT (tool-sequence assertions) runs in nightly/release.

  rag/policy:
    layer: 2
    active_version: v1.0
    file: rag/policy.v1.jsonl
    sha256: b2ea3af9321463592cbd22c92c2391a815d68b588ee99f0435e903d87361e108
    case_count: 5
    last_reviewed: "2026-07-08"
    note: >
      Layer-2 RAG-quality cases grounded on the real ShipSmart-API corpus
      (relevant_doc_ids/must_cite_any reference actual data/documents/* files,
      asserted by contract/test_rag_corpus_refs.py). The CI lane runs them
      through the deterministic stub SUT; the live-retriever SUT (semantic
      recall/precision) runs in the nightly/release lanes.

  smoke/foundation:
    layer: 1
    active_version: v1.0
    file: smoke/foundation.v1.jsonl
    sha256: 9f5c4117484e8e99af415424dbe27440bb17d45d41b631ab466d4156007bd991
    case_count: 5
    last_reviewed: "2026-07-07"
    note: >
      Foundation self-test suite — exercises the harness (load -> run -> grade ->
      gate -> trace -> history) end-to-end with the deterministic keyless EchoSUT.
      Not a product test. Real layer datasets (contract/rag/agent/safety/product)
      are registered here as their phases land.
